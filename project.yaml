name: pyspark-data-quality-toolkit
owner: Engr-InamUllah
status: scaffold
stack: 'Python, PySpark, pytest, YAML'
pipeline:
  - load_rules
  - profile
  - validate
  - summarize
quality_gates:
  - schema_validation
  - null_thresholds
  - duplicate_detection
  - freshness_check
  - automated_tests
security:
  secrets: environment_or_secret_store
  least_privilege: true